services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jrv_impact}
      POSTGRES_USER: ${POSTGRES_USER:-jrv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - jrv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jrv_user} -d ${POSTGRES_DB:-jrv_impact}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-jrv_impact};Username=${POSTGRES_USER:-jrv_user};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      Jwt__Key: ${JWT_KEY:?Set JWT_KEY in .env - at least 32 random characters}
      Jwt__Issuer: ${JWT_ISSUER:-JrvImpact}
      Jwt__Audience: ${JWT_AUDIENCE:-JrvImpactClient}
      Jwt__ExpiryHours: ${JWT_EXPIRY_HOURS:-12}
      Seed__AdminPassword: ${ADMIN_PASSWORD:-Admin@123}
      Cors__AllowedOrigins__0: ${PUBLIC_URL:-http://localhost}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    volumes:
      - jrv_uploads:/app/wwwroot/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      BACKEND_URL: http://backend:8080

volumes:
  jrv_pgdata:
  jrv_uploads:
